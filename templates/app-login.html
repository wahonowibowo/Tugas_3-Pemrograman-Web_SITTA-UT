<main class="flex-1 flex items-center justify-center z-10 px-4 mt-10">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-2xl shadow-2xl px-6 py-5 floating-card border border-gray-100">
            <div class="text-center mb-3">
                <div class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-2">
                    <img src="assets/img/ut.png" alt="Logo Universitas Terbuka" class="w-14 h-14 object-contain">
                </div>
                <h1 class="text-base font-bold text-blue-900 leading-snug">Selamat Datang di Website</h1>
                <p class="text-xs text-gray-500 mt-0.5 leading-relaxed">Sistem Informasi Tiras dan Transaksi Bahan Ajar Universitas Terbuka</p>
                <p class="text-orange-500 font-bold text-sm mt-0.5 tracking-wide">(SITTA-UT)</p>
            </div>
            <div class="flex items-center gap-3 mb-3">
                <div class="flex-1 h-px bg-gradient-to-r from-transparent via-gray-200 to-transparent"></div>
                <span class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Login</span>
                <div class="flex-1 h-px bg-gradient-to-r from-transparent via-gray-200 to-transparent"></div>
            </div>
            
            <div v-if="errorMessage" class="mb-3 p-2 bg-red-50 text-red-600 text-xs rounded border border-red-200 text-center">
                {{ errorMessage }}
            </div>

            <form @submit.prevent="submitLogin" class="space-y-3">
                <div>
                    <label for="email" class="block text-xs font-medium text-gray-700 mb-0.5">Email</label>
                    <input type="email" id="email" v-model="email" placeholder="Contoh: admin@ut.ac.id" class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" required>
                </div>
                <div>
                    <label for="password" class="block text-xs font-medium text-gray-700 mb-0.5">Password</label>
                    <input type="password" id="password" v-model="password" placeholder="Masukkan password Anda" class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm" required>
                    <div class="flex justify-end mt-1">
                        <a href="#" @click.prevent="forgotPassword" class="text-xs text-blue-600 hover:text-orange-500 font-medium transition-colors">Lupa Password?</a>
                    </div>
                </div>
                <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-all transform hover:-translate-y-0.5 text-sm">Login</button>
            </form>
            <div class="mt-3 text-center">
                <a href="#" @click.prevent="register" class="text-xs text-blue-600 hover:text-orange-500 font-medium transition-colors">Belum punya akun?</a>
            </div>
            <div class="mt-3 bg-slate-50 p-2.5 rounded-lg text-[11px] text-slate-600 border border-slate-100">
                <p class="font-bold text-slate-700 mb-0.5">Akun demo:</p>
                <div class="space-y-0">
                    <p>admin@ut.ac.id / admin123</p>
                    <p>rina@ut.ac.id / rina123</p>
                </div>
            </div>
        </div>
    </div>
</main>
